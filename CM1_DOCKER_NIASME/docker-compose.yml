
services:
  # Service PHP pour Laravel
  app:
    image: php:8.4-fpm
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - laravel

  # Service Nginx (serveur web)
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel
    depends_on:
      - app

# Réseau pour la communication entre conteneurs
networks:
  laravel:
    driver: bridge

# Volume pour persister les données
volumes:
  dbdata:
    driver: local